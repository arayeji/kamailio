# HTTP NMS API on P-CSCF (native ims_nms_api module via xhttp)
# Enable with #!define WITH_NMS_API

#!ifdef WITH_NMS_API

include_file "../nms-api.cfg"

loadmodule "xhttp.so"
loadmodule "ims_nms_api.so"

#!ifndef WITH_WEBSOCKET
# Only one event_route[xhttp:request] is allowed; when WebSocket is enabled,
# route/websocket.cfg dispatches NMS on port 9281.
event_route[xhttp:request] {
	ims_nms_api_dispatch();
	exit;
}
#!endif

#!endif
