# HTTP NMS API on S-CSCF (native ims_nms_api module via xhttp)
# Enable with #!define WITH_NMS_API

#!ifdef WITH_NMS_API

# User settings: copy nms-api.cfg.sample to nms-api.cfg and edit IP/port/token.
include_file "../nms-api.cfg"

loadmodule "xhttp.so"
loadmodule "ims_nms_api.so"

# O(1) per-IMSI dialog lookup (see nms_profile_scscf.cfg)
modparam("ims_dialog", "profiles_with_value", "nmsimsi")

event_route[xhttp:request] {
	ims_nms_api_dispatch();
	exit;
}

#!endif
