# NMS dialog profile tagging for S-CSCF (O(1) per-IMSI call lookup)
# Enable with #!define WITH_NMS_API
# Requires: modparam("ims_dialog", "profiles_with_value", "... nms_imsi")

#!ifdef WITH_NMS_API

# Tag new dialogs with IMSI for ims_nms_api profile lookup.
route[NMS_CALL_PROFILE] {
	if (!is_method("INVITE") || has_totag()) return;

	# Tag dialogs with IMSI and MSISDN (From user) so API lookup by IMSI finds MSISDN-tagged calls.
	$var(nms_imsi) = $(fu{uri.user});
	if ($var(nms_imsi) != $null && $var(nms_imsi) != "") {
		set_dlg_profile("nms_imsi", $var(nms_imsi));
	}
	if ($au != $null && $(au{uri.user}) != $null && $(au{uri.user}) != "") {
		set_dlg_profile("nms_imsi", $(au{uri.user}));
	} else if ($fU != $null && $fU != "" && $fU != $var(nms_imsi)) {
		set_dlg_profile("nms_imsi", $fU);
	}
}

#!endif
