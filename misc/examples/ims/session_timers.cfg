# SIP Session Timers (RFC 4028 / 3GPP TS 24.229)
#
# Aligns ims_dialog lifetime with negotiated Session-Expires instead of the
# 12-hour ims_dialog default. Requires in each CSCF kamailio.cfg:
#   modparam("ims_dialog", "default_timeout", SESSION_TIMER_DEFAULT)
#   modparam("ims_dialog", "timeout_avp", "$avp(DLG_TIMEOUT_AVP)")
#   #!define DLG_TIMEOUT_AVP "i:N"  (per-CSCF AVP id)
#
# Optional media-plane cleanup on P-CSCF (rtpengine daemon must support it):
#   #!define WITH_RTPENGINE_TIMEOUT

#!define SESSION_TIMER_DEFAULT 1800
#!define SESSION_TIMER_MIN_SE 90

route[SESSION_TIMER_INIT] {
	if (!isflagset(FLT_DIALOG))
		return;
	if (!is_method("INVITE") || has_totag())
		return;

	if (is_present_hf("Session-Expires")) {
		if ($(hdr(Session-Expires){s.int}) > 0)
			$avp(DLG_TIMEOUT_AVP) = $(hdr(Session-Expires){s.int});
		else
			$avp(DLG_TIMEOUT_AVP) = SESSION_TIMER_DEFAULT;
	} else {
		$avp(DLG_TIMEOUT_AVP) = SESSION_TIMER_DEFAULT;
		append_hf("Session-Expires: SESSION_TIMER_DEFAULT;refresher=uac\r\n");
	}

	if (!is_present_hf("Min-SE"))
		append_hf("Min-SE: SESSION_TIMER_MIN_SE\r\n");

	if (!is_present_hf("Supported")) {
		append_hf("Supported: timer\r\n");
	} else if (!search("^Supported:.*timer")) {
		subst_hf("Supported", "/(.*)/\\1, timer/");
	}
}

route[SESSION_TIMER_REFRESH] {
	if (!isflagset(FLT_DIALOG))
		return;
	if (!has_totag())
		return;
	if (!is_method("INVITE|UPDATE"))
		return;
	if (is_present_hf("Session-Expires") && $(hdr(Session-Expires){s.int}) > 0)
		$avp(DLG_TIMEOUT_AVP) = $(hdr(Session-Expires){s.int});
}

route[SESSION_TIMER_REPLY] {
	if (!isflagset(FLT_DIALOG))
		return;
	if (status !~ "2[0-9][0-9]")
		return;
	if (is_present_hf("Session-Expires") && $(hdr(Session-Expires){s.int}) > 0)
		$avp(DLG_TIMEOUT_AVP) = $(hdr(Session-Expires){s.int});
}

#!ifdef WITH_RTPENGINE_TIMEOUT
# Align rtpengine call lifetime with SIP session timer (P-CSCF).
route[RTPENGINE_SESSION_TIMEOUT] {
	if ($avp(rtpproxy_offer_flags) == $null)
		return;
	if ($avp(rtpproxy_offer_flags) =~ "timeout=")
		return;
	$avp(rtpproxy_offer_flags) = $avp(rtpproxy_offer_flags)
			+ " timeout=" + SESSION_TIMER_DEFAULT;
}
#!endif
