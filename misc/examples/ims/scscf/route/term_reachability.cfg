# =====================================================================
# Terminating VoLTE — UE Reachability & IMS Restoration (T-ADS)
# Pure standard Diameter Sh (TS 29.328/29.329). No proprietary API.
# ---------------------------------------------------------------------
# 3GPP: TS 23.228, TS 23.237 (T-ADS/ICS), TS 23.401, TS 29.228/29.229
#       (Cx), TS 29.328/29.329 (Sh), TS 29.272 (S6a), TS 24.229,
#       TS 23.272 (CSFB).
#
# Design doc: ../../docs/terminating-volte-reachability.md
#
# STANDARD INTERFACE SPLIT (design doc §3):
#   * Kamailio (S-CSCF / SCC AS)  <-- Sh -->  HSS    (this config speaks Sh)
#   * HSS                         <-- S6a --> MME    (HSS-internal; URRP-MME)
#   Kamailio NEVER speaks S6a to the MME. The "alert/page" request is an
#   Sh SNR (Subscribe-Notifications, UE-Reachability); the HSS arms the MME via
#   S6a IDR(URRP-MME) and pushes the result back as an Sh PNR.
#
# Sh primitives used here (App-Id 16777217, vendor 10415):
#   * UDR/UDA 306 : read serving MME (PS), VLR/MSC (CS), IMS user state
#   * SNR/SNA 308 : subscribe to UE-Reachability  (-> HSS arms MME)
#   * PNR/PNA 309 : HSS push "UE reachable"        (-> resume the INVITE)
#
# Enable in scscf/kamailio.cfg:
#   #!define WITH_TERM_REACHABILITY
#
# Integration hooks (all guarded, inert by default):
#   1) include_file "route/term_reachability.cfg"            (after cdp/ims_* load)
#   2) route[term], before route(FINAL_TERM):
#        #!ifdef WITH_TERM_REACHABILITY
#        if (is_method("INVITE")) { route(TERM_REACH_ENTRY); }
#        #!endif
#   3) route[REGISTER] SAR-success reply routes:
#        #!ifdef WITH_TERM_REACHABILITY
#        route(TERM_REACH_ON_REGISTER);
#        #!endif
#
# NOTE: $T(id_index)/$T(id_label), t_suspend()/t_continue(), htable iterators,
# and the Sh-Data XML XPaths are version/HSS dependent — validate with
# `kamailio -c` and against your HSS Sh-Data schema before deployment.
# =====================================================================

#!ifdef WITH_TERM_REACHABILITY

# ---------------------------------------------------------------------
# Deployment-specific defines (override in scscf.cfg).
# ---------------------------------------------------------------------
#!ifndef PLMN_REALM
#!define PLMN_REALM "ims.mnc001.mcc001.3gppnetwork.org"
#!endif
#!ifndef HSS_REALM
#!define HSS_REALM "ims.mnc001.mcc001.3gppnetwork.org"
#!endif
#!ifndef SCSCF_SERVER_NAME
#!define SCSCF_SERVER_NAME "sip:scscf.ims.mnc001.mcc001.3gppnetwork.org:6060"
#!endif

# ---------------------------------------------------------------------
# Modules (cdp / cdp_avp are already loaded by the S-CSCF).
# ---------------------------------------------------------------------
loadmodule "htable.so"
loadmodule "rtimer.so"
loadmodule "ims_diameter_server.so"   # generic Diameter sender + diameter:* event routes
loadmodule "xmlops.so"                # parse the Sh-Data XML (TS 29.328 schema)

# ---------------------------------------------------------------------
# State + config tables
#   term_pending : live suspended terminating sessions (authoritative)
#   term_cfg     : runtime-tunable parameters (RPC htable.seti/sets)
# ---------------------------------------------------------------------
modparam("htable", "htable", "term_pending=>size=12;autoexpire=60;")
modparam("htable", "htable", "term_cfg=>size=4;")

modparam("rtimer", "timer", "name=tr_scan;interval=1;mode=1;")
modparam("rtimer", "exec", "timer=tr_scan;route=TERM_REACH_SCAN")

event_route[htable:mod-init] {
	if ($sht(term_cfg=>init) == $null) {
		$sht(term_cfg=>init)                   = 1;
		$sht(term_cfg=>paging_timeout_s)       = 5;   # max wait for restoration
		$sht(term_cfg=>max_paging_attempts)    = 2;
		$sht(term_cfg=>ue_up_wait_s)           = 2;   # short wait if UE already up
		$sht(term_cfg=>unreachable_action)     = "voicemail";  # voicemail|forward|reject
		$sht(term_cfg=>unreachable_reject_code)= 480;
		$sht(term_cfg=>vm_uri)                 = "sip:voicemail@ims.mnc001.mcc001.3gppnetwork.org";
	}
}

# =====================================================================
# ENTRY: terminating INVITE reaching route[term]. Requirements 1,2,3.
# =====================================================================
route[TERM_REACH_ENTRY] {
	xlog("L_INFO", "TERM-REACH INVITE cid=$ci impu=$tu ru=$ru from=$fu src=$si:$sp\n");

	if (term_impu_has_contact("location")) {
		xlog("L_INFO", "TERM-REACH IMSREG cid=$ci impu=$tu state=registered -> IMS\n");
		return;   # normal flow (FINAL_TERM) delivers VoLTE
	}
	xlog("L_INFO", "TERM-REACH IMSREG cid=$ci impu=$tu state=unregistered\n");

	$var(impu) = $tu;
	if ($var(impu) == $null || $var(impu) == "") { $var(impu) = $ru; }

	route(TERM_REACH_HANDLE);
	exit;
}

# =====================================================================
# HANDLE: Sh UDR query + T-ADS decision. Requirements 5,6,7.
# =====================================================================
route[TERM_REACH_HANDLE] {
	# ---- Sh User-Data-Request (TS 29.328 §6.1.1 / TS 29.329 §6.1) ----
	# App-Id 16777217 (Sh), Command 306 (UDR).
	# Data-Reference: 11 IMSUserState, 14 LocationInformation, 15 UserState.
	# Requested-Domain (706): request both CS and PS location (two UDRs would be
	# cleaner; many HSS return both in one UDA - adjust to your HSS).
	# Base AVPs auto-added by CDP: Session-Id(263), Origin-Host(264),
	# Origin-Realm(296). We add Auth-Session-State, Vendor-Specific-Application-Id,
	# Destination-Realm and the Sh payload AVPs.
	$var(udr) = "[" +
		"{\"avpCode\":277,\"vendorId\":0,\"Flags\":64,\"int32\":1}," +
		"{\"avpCode\":260,\"vendorId\":0,\"Flags\":64,\"list\":[" +
			"{\"avpCode\":266,\"vendorId\":0,\"Flags\":64,\"int32\":10415}," +
			"{\"avpCode\":258,\"vendorId\":0,\"Flags\":64,\"int32\":16777217}]}," +
		"{\"avpCode\":283,\"vendorId\":0,\"Flags\":64,\"string\":\"" + HSS_REALM + "\"}," +
		"{\"avpCode\":700,\"vendorId\":10415,\"Flags\":192,\"list\":[" +
			"{\"avpCode\":601,\"vendorId\":10415,\"Flags\":192,\"string\":\"" + $var(impu) + "\"}]}," +
		"{\"avpCode\":703,\"vendorId\":10415,\"Flags\":192,\"int32\":11}," +
		"{\"avpCode\":703,\"vendorId\":10415,\"Flags\":192,\"int32\":14}," +
		"{\"avpCode\":703,\"vendorId\":10415,\"Flags\":192,\"int32\":15}," +
		"{\"avpCode\":602,\"vendorId\":10415,\"Flags\":192,\"string\":\"" + SCSCF_SERVER_NAME + "\"}," +
		"{\"avpCode\":710,\"vendorId\":10415,\"Flags\":192,\"int32\":0}]";

	if (!diameter_request("16777217", "306", "$var(udr)")) {
		# Requirement 10: HSS unavailable / Diameter timeout (CDP TransactionTimeout).
		xlog("L_ERR", "TERM-REACH HSSQ cid=$ci impu=$var(impu) Sh-UDR failed -> fallback\n");
		route(TERM_REACH_FALLBACK);
		exit;
	}

	# UDA -> $diameter_response (JSON array of AVPs). The application data is the
	# Sh-Data XML inside User-Data (AVP 606). Extract + parse it.
	$var(uda) = $diameter_response;
	route(TERM_REACH_PARSE_UDA);

	# Requirement 9.
	xlog("L_INFO", "TERM-REACH HSSQ cid=$ci impu=$var(impu) imsState=$var(ims_state) ueReach=$var(ue_reach)\n");
	xlog("L_INFO", "TERM-REACH MME cid=$ci impu=$var(impu) servingMme=$var(mme)\n");
	xlog("L_INFO", "TERM-REACH VLR cid=$ci impu=$var(impu) vlrNumber=$var(vlr)\n");

	# --- T-ADS decision (design doc §2) ------------------------------
	if ($var(mme) != $null && $var(mme) != "") {
		if ($var(ue_reach) == "true") {
			$var(wait_s) = $sht(term_cfg=>ue_up_wait_s);    # (b) UE up, short wait
		} else {
			$var(wait_s) = $sht(term_cfg=>paging_timeout_s); # (a) subscribe + wait
		}
		route(TERM_REACH_ALERT);     # Sh SNR -> HSS arms MME via S6a IDR(URRP)
		route(TERM_REACH_SUSPEND);
		exit;
	}
	if ($var(vlr) != $null && $var(vlr) != "") {
		xlog("L_INFO", "TERM-REACH CSFB cid=$ci impu=$var(impu) reason=no-mme-vlr-present\n");
		route(TERM_REACH_ROUTE_CS);
		exit;
	}
	route(TERM_REACH_UNREACHABLE);
	exit;
}

# Parse the Sh-Data XML returned in UDA User-Data (AVP 606).
# Adjust XPaths to your HSS Sh-Data schema (TS 29.328 Annex / vendor profile).
route[TERM_REACH_PARSE_UDA] {
	$var(mme) = ""; $var(vlr) = ""; $var(ims_state) = ""; $var(ue_reach) = "";

	# Pull the raw User-Data (606) value out of the AVP-array JSON. How
	# AAAmsg2json serialises an OctetString (raw XML string vs hex) is
	# build-dependent; this grabs the "string" form. Confirm against your build.
	$var(shxml) = $(var(uda){re.subst,/^.*"avpCode":606[^}]*"string":"([^"]*)".*$/\1/});
	if ($var(shxml) == $var(uda)) {
		xlog("L_WARN", "TERM-REACH cid=$ci impu=$var(impu) UDA has no User-Data/606 (check Sh schema)\n");
		return;
	}
	# If the XML was XML-escaped inside JSON, unescape &lt;/&gt;/&quot; first.
	$var(shxml) = $(var(shxml){s.replace,&lt;,<});
	$var(shxml) = $(var(shxml){s.replace,&gt;,>});
	$var(shxml) = $(var(shxml){s.replace,&quot;,"});

	# Load + xpath (TS 29.328 Sh-Data schema; element names are release/HSS
	# dependent - align with your pretty5gs Sh-Data output).
	$xml(shdoc=>doc) = $var(shxml);
	$var(ims_state) = $xml(shdoc=>xpath:/Sh-Data/Sh-IMS-Data/IMSUserState/text());
	$var(mme)       = $xml(shdoc=>xpath://PSLocationInformation/MMEName/text());
	$var(vlr)       = $xml(shdoc=>xpath://CSLocationInformation/VLRNumber/text());
	$var(ue_reach)  = $xml(shdoc=>xpath://UE-Reachable/text());
}

# =====================================================================
# ALERT: Sh SNR (Subscribe-Notifications, UE-Reachability). Requirements 4,7.
# HSS maps the subscription to S6a IDR(URRP-MME) toward the MME and will later
# push an Sh PNR when the UE is reachable.
# Spec: TS 29.328 §6.1.2 (SNR/SNA); TS 29.272 §5.2.2 (IDR/URRP), §5.2.3 (NOR).
# =====================================================================
route[TERM_REACH_ALERT] {
	$var(att) = $shtinc(term_pending=>$var(impu)::attempts);
	if ($var(att) > $sht(term_cfg=>max_paging_attempts)) {
		xlog("L_WARN", "TERM-REACH ALERT cid=$ci impu=$var(impu) max_attempts_reached\n");
		return;
	}
	xlog("L_INFO", "TERM-REACH ALERT cid=$ci impu=$var(impu) attempt=$var(att) -> Sh SNR(UE-Reachability)\n");

	# App 16777217 / Command 308 (SNR). Subs-Req-Type(705)=0 (Subscribe).
	$var(snr) = "[" +
		"{\"avpCode\":277,\"vendorId\":0,\"Flags\":64,\"int32\":1}," +
		"{\"avpCode\":260,\"vendorId\":0,\"Flags\":64,\"list\":[" +
			"{\"avpCode\":266,\"vendorId\":0,\"Flags\":64,\"int32\":10415}," +
			"{\"avpCode\":258,\"vendorId\":0,\"Flags\":64,\"int32\":16777217}]}," +
		"{\"avpCode\":283,\"vendorId\":0,\"Flags\":64,\"string\":\"" + HSS_REALM + "\"}," +
		"{\"avpCode\":700,\"vendorId\":10415,\"Flags\":192,\"list\":[" +
			"{\"avpCode\":601,\"vendorId\":10415,\"Flags\":192,\"string\":\"" + $var(impu) + "\"}]}," +
		"{\"avpCode\":705,\"vendorId\":10415,\"Flags\":192,\"int32\":0}," +
		"{\"avpCode\":703,\"vendorId\":10415,\"Flags\":192,\"int32\":15}," +
		"{\"avpCode\":602,\"vendorId\":10415,\"Flags\":192,\"string\":\"" + SCSCF_SERVER_NAME + "\"}]";
	if (!diameter_request("16777217", "308", "$var(snr)")) {
		# Requirement 10: HSS/MME unavailable -> no paging armed.
		xlog("L_WARN", "TERM-REACH ALERT cid=$ci impu=$var(impu) Sh-SNR failed (no paging armed)\n");
	}

	xlog("L_INFO", "TERM-REACH PAGING cid=$ci impu=$var(impu) attempt=$var(att) timeout=$var(wait_s)s\n");
	return;
}

# =====================================================================
# Sh PNR handler (HSS -> S-CSCF push): UE became reachable.
# HSS sends Push-Notification-Request (App 16777217 / cmd 309) after the MME
# reported reachability over S6a NOR. Resume the suspended INVITE; reply PNA.
# Spec: TS 29.328 §6.1.3. Dispatched from event_route[diameter:request] below.
# =====================================================================
route[TERM_REACH_DIAMETER_REQUEST] {
	if ($diameter_application == "16777217" && $diameter_command == "309") {
		# Public identity carried in the PNR (User-Identity > Public-Identity 601).
		$var(pimpu) = $(diameter_request{re.subst,/^.*"avpCode":601[^}]*"string":"([^"]*)".*$/\1/});
		xlog("L_INFO", "TERM-REACH RESTORE(PNR) impu=$var(pimpu) -> resume\n");
		$var(impu) = $var(pimpu);
		route(TERM_REACH_RESUME_KEY);
		# Minimal PNA (Result-Code 2001 DIAMETER_SUCCESS).
		$diameter_response = "[{\"avpCode\":268,\"vendorId\":0,\"Flags\":64,\"int32\":2001}]";
	}
}

# Dispatch incoming HSS-initiated Diameter requests (Sh PNR) to the handler.
# If your config already defines event_route[diameter:request], merge this call.
event_route[diameter:request] {
	route(TERM_REACH_DIAMETER_REQUEST);
}

# =====================================================================
# SUSPEND: park the INVITE + register a pending entry (Requirement 8).
# =====================================================================
route[TERM_REACH_SUSPEND] {
	t_newtran();
	if (!t_suspend()) {
		xlog("L_ERR", "TERM-REACH cid=$ci impu=$var(impu) t_suspend failed -> fallback\n");
		route(TERM_REACH_FALLBACK);
		exit;
	}
	$sht(term_pending=>$var(impu)::idx)      = $T(id_index);
	$sht(term_pending=>$var(impu)::lbl)      = $T(id_label);
	$sht(term_pending=>$var(impu)::deadline) = $TV(s) + $var(wait_s);
	$sht(term_pending=>$var(impu)::vlr)      = $var(vlr);
	$sht(term_pending=>$var(impu)::cid)      = $ci;
	xlog("L_DBG", "TERM-REACH cid=$ci impu=$var(impu) suspended idx=$T(id_index) lbl=$T(id_label) deadline=+$var(wait_s)s\n");
	exit;
}

# =====================================================================
# RESTORATION via IMS REGISTER (route[REGISTER] SAR-success).
# =====================================================================
route[TERM_REACH_ON_REGISTER] {
	$var(impu) = $tu;
	if ($var(impu) == $null || $var(impu) == "") { $var(impu) = $fu; }
	route(TERM_REACH_RESUME_KEY);
}

# Resume the suspended terminating session for $var(impu) (race-safe).
# Used by both the IMS-REGISTER hook and the Sh-PNR handler.
route[TERM_REACH_RESUME_KEY] {
	if ($sht(term_pending=>$var(impu)::idx) == $null) {
		return;   # nothing waiting for this user
	}
	$var(claim) = $shtinc(term_pending=>$var(impu)::claim);
	if ($var(claim) != 1) {
		return;   # timeout scan already resumed it
	}
	$var(idx) = $sht(term_pending=>$var(impu)::idx);
	$var(lbl) = $sht(term_pending=>$var(impu)::lbl);
	xlog("L_INFO", "TERM-REACH RESTORE cid=$sht(term_pending=>$var(impu)::cid) impu=$var(impu) -> resume idx=$var(idx)\n");
	t_continue("$var(idx)", "$var(lbl)", "TERM_REACH_RESUME");
}

# Resumed terminating transaction after restoration: deliver via IMS.
route[TERM_REACH_RESUME] {
	$var(impu) = $tu;
	if ($var(impu) == $null || $var(impu) == "") { $var(impu) = $ru; }
	route(TERM_REACH_CLEAR);
	xlog("L_INFO", "TERM-REACH ROUTE cid=$ci impu=$var(impu) dest=ims-contact\n");
	route(FINAL_TERM);
	exit;
}

# =====================================================================
# SCAN (rtimer): expire pending sessions past their paging deadline.
# =====================================================================
route[TERM_REACH_SCAN] {
	sht_iterator_start("tr_it", "term_pending");
	while(sht_iterator_next("tr_it")) {
		if ($shtitkey(tr_it) =~ "::deadline$") {
			if ($shtitval(tr_it) != $null && $shtitval(tr_it) <= $TV(s)) {
				$var(k) = $(shtitkey(tr_it){s.replace,::deadline,});
				$var(claim) = $shtinc(term_pending=>$var(k)::claim);
				if ($var(claim) == 1) {
					$var(idx) = $sht(term_pending=>$var(k)::idx);
					$var(lbl) = $sht(term_pending=>$var(k)::lbl);
					xlog("L_INFO", "TERM-REACH PAGEEXP impu=$var(k) -> resume idx=$var(idx)\n");
					t_continue("$var(idx)", "$var(lbl)", "TERM_REACH_TIMEOUT");
				}
			}
		}
	}
	sht_iterator_end("tr_it");
}

# Resumed after paging timeout: CS fallback or unreachable policy.
route[TERM_REACH_TIMEOUT] {
	$var(impu) = $tu;
	if ($var(impu) == $null || $var(impu) == "") { $var(impu) = $ru; }
	$var(vlr) = $sht(term_pending=>$var(impu)::vlr);
	xlog("L_INFO", "TERM-REACH PAGEEXP cid=$ci impu=$var(impu) no-ims-registration\n");
	route(TERM_REACH_CLEAR);
	if ($var(vlr) != $null && $var(vlr) != "") {
		route(TERM_REACH_ROUTE_CS);
		exit;
	}
	route(TERM_REACH_UNREACHABLE);
	exit;
}

# =====================================================================
# CS fallback to MSC/VLR (Requirements 6.timeout, 7). Spec: TS 23.272.
# =====================================================================
route[TERM_REACH_ROUTE_CS] {
	if ($var(vlr) == $null || $var(vlr) == "") {
		$var(vlr) = $sht(term_pending=>$var(impu)::vlr);
	}
	xlog("L_INFO", "TERM-REACH CSFB cid=$ci impu=$var(impu) vlr=$var(vlr) policy=route-to-msc\n");
	xlog("L_INFO", "TERM-REACH ROUTE cid=$ci impu=$var(impu) dest=cs via-mgcf\n");
	# Default: hand to the MGCF/PSTN dispatcher (route[PSTN]) to reach the CS
	# domain. Replace with explicit MSC routing keyed on the VLR if you do
	# MAP/ISUP interworking.
	route(PSTN);
	exit;
}

# =====================================================================
# Unreachable-subscriber policy (Requirement 6.otherwise). Spec: TS 23.228.
# =====================================================================
route[TERM_REACH_UNREACHABLE] {
	$var(action) = $sht(term_cfg=>unreachable_action);
	xlog("L_INFO", "TERM-REACH ROUTE cid=$ci impu=$var(impu) dest=unreachable action=$var(action)\n");
	t_newtran();
	if ($var(action) == "voicemail" || $var(action) == "forward") {
		$ru = $sht(term_cfg=>vm_uri);
		if (!t_relay()) { t_reply("480", "Temporarily Unavailable"); }
		exit;
	}
	$var(code) = $sht(term_cfg=>unreachable_reject_code);
	t_reply("$var(code)", "Temporarily Unavailable");
	exit;
}

# =====================================================================
# FALLBACK on HSS/Diameter failure (Requirement 10).
# =====================================================================
route[TERM_REACH_FALLBACK] {
	if ($sht(term_pending=>$var(impu)::vlr) != $null
			&& $sht(term_pending=>$var(impu)::vlr) != "") {
		$var(vlr) = $sht(term_pending=>$var(impu)::vlr);
		route(TERM_REACH_ROUTE_CS);
		exit;
	}
	route(TERM_REACH_UNREACHABLE);
	exit;
}

# Best-effort cleanup of pending-session keys ($null assignment deletes).
route[TERM_REACH_CLEAR] {
	$sht(term_pending=>$var(impu)::idx)      = $null;
	$sht(term_pending=>$var(impu)::lbl)      = $null;
	$sht(term_pending=>$var(impu)::deadline) = $null;
	$sht(term_pending=>$var(impu)::vlr)      = $null;
	$sht(term_pending=>$var(impu)::cid)      = $null;
	$sht(term_pending=>$var(impu)::attempts) = $null;
	$sht(term_pending=>$var(impu)::claim)    = $null;
}

#!endif
# end WITH_TERM_REACHABILITY
